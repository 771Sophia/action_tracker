<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1e2f" />
      <stop offset="100%" stop-color="#0f0f15" />
    </radialGradient>
    <linearGradient id="neon-ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="neon-ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff87" />
      <stop offset="100%" stop-color="#60efff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="128" fill="url(#bg-grad)" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#neon-ring1)" stroke-width="24" stroke-linecap="round" filter="url(#glow)" />
  <circle cx="256" cy="256" r="110" fill="none" stroke="url(#neon-ring2)" stroke-width="18" stroke-dasharray="400" stroke-dashoffset="80" stroke-linecap="round" filter="url(#glow)" />
  <polygon points="230,200 310,256 230,312" fill="#ffffff" filter="url(#glow)" />
</svg>
